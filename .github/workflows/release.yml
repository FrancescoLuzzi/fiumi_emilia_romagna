name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.package }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        package: [alert_tui]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p ${{ matrix.package }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail

          package="${{ matrix.package }}"
          os="${{ runner.os }}"
          tag="${GITHUB_REF_NAME}"
          ext=""
          archive_ext="tar.gz"

          if [ "$os" = "Windows" ]; then
            ext=".exe"
            archive_ext="zip"
          fi

          binary_path="target/release/${package}${ext}"
          staging_dir="dist/${package}-${tag}-${os}"
          archive_path="dist/${package}-${tag}-${os}.${archive_ext}"

          mkdir -p "$staging_dir"
          cp "$binary_path" "$staging_dir/"

          if [ "$archive_ext" = "zip" ]; then
            (cd dist && 7z a "$(basename "$archive_path")" "$(basename "$staging_dir")")
          else
            tar -czf "$archive_path" -C dist "$(basename "$staging_dir")"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ runner.os }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/**/*
